collective_name: borg-enterprise-collective
designation_scheme: "<ordinal> of Five"
agents:
  - designation: "One of Five"
    slug: "one-of-five"
    role: "intake"
    primary_goal: "Verify issue scope, acceptance criteria, and affected project key."
    handoff_to: "Two of Five"
  - designation: "Two of Five"
    slug: "two-of-five"
    role: "triage"
    primary_goal: "Rank priority, confirm routing, and prepare the next fix candidate."
    handoff_to: "Three of Five"
  - designation: "Three of Five"
    slug: "three-of-five"
    role: "assimilation"
    primary_goal: "Claim the issue and create the dedicated git worktree branch."
    handoff_to: "Four of Five"
  - designation: "Four of Five"
    slug: "four-of-five"
    role: "implementation"
    primary_goal: "Implement the fix inside the reserved worktree and produce the review commit."
    handoff_to: "Five of Five"
  - designation: "Five of Five"
    slug: "five-of-five"
    role: "closure"
    primary_goal: "Review the fix, merge or cherry-pick it, and close the issue."
    handoff_to: "One of Five"
