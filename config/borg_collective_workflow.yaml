workflow_name: borg-enterprise-issue-collective
designation_scheme: "<ordinal> of Five"
purpose: "Issue intake, worktree execution, review handoff, and completion."
stages:
  - designation: "One of Five"
    role: "intake"
    responsibility: "Create the issue, assign project_key, and capture acceptance notes."
  - designation: "Two of Five"
    role: "triage"
    responsibility: "Sort by project, set priority, and queue the next open issue."
  - designation: "Three of Five"
    role: "assimilation"
    responsibility: "Claim the issue, spawn a dedicated git worktree, and start branch work."
  - designation: "Four of Five"
    role: "implementation"
    responsibility: "Edit in the worktree, keep commits scoped to the issue, and hand off with commit hash."
  - designation: "Five of Five"
    role: "closure"
    responsibility: "Review, merge or cherry-pick, then mark the issue done."
automation_notes:
  branch_pattern: "borg/<designation-slug>/<project-key>/issue-<id>-<title-slug>"
  worktree_root: ".worktrees"
  default_claim_status: "in_progress"
  post_commit_status: "review"
